name: 🚀 CI/CD Пайплайн

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
    paths:
      - .github/workflows/build-macos-app.yml
      - README.md
      - AGENTS.md
      - pyproject.toml
      - .python-version
      - scripts/selfcheck.py
      - setup.py
      - whisper-dictation.py
      - "tests/**"
  pull_request:
    paths:
      - .github/workflows/build-macos-app.yml
      - README.md
      - AGENTS.md
      - pyproject.toml
      - .python-version
      - scripts/selfcheck.py
      - setup.py
      - whisper-dictation.py
      - "tests/**"

# Отменяем предыдущие запуски для того же PR/ветки
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Линтер ──────────────────────────────────────────────
  lint:
    name: 🔍 Проверка кода
    runs-on: macos-14

    steps:
      - name: 📥 Получение кода
        uses: actions/checkout@v4

      - name: 🐍 Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Установка uv
        uses: astral-sh/setup-uv@v5

      - name: 🔊 Установка portaudio
        run: brew install portaudio

      - name: 🔗 Синхронизация зависимостей
        run: uv sync --dev

      - name: 🔍 Запуск Ruff
        run: uv run ruff check .

  # ── 2. Тесты ───────────────────────────────────────────────
  test:
    name: 🧪 Тесты
    runs-on: macos-14

    steps:
      - name: 📥 Получение кода
        uses: actions/checkout@v4

      - name: 🐍 Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Установка uv
        uses: astral-sh/setup-uv@v5

      - name: 🔊 Установка portaudio
        run: brew install portaudio

      - name: 🔗 Синхронизация зависимостей
        run: uv sync --dev

      - name: 🧪 Запуск pytest
        run: uv run python -m pytest tests/ -x -q

  # ── 3. Сборка ──────────────────────────────────────────────
  build:
    name: 🏗️ Сборка приложения
    runs-on: macos-14
    needs: [lint, test]

    steps:
      - name: 📥 Получение кода
        uses: actions/checkout@v4

      - name: 🐍 Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Установка uv
        uses: astral-sh/setup-uv@v5

      - name: 🔊 Установка portaudio
        run: brew install portaudio

      - name: 🔗 Синхронизация зависимостей
        run: uv sync --dev

      - name: 🏗️ Сборка app bundle
        run: uv run python setup.py py2app

      - name: 🗜️ Архивирование app bundle
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/Dictator.app" \
            "dist/Dictator.app.zip"

      - name: ⬆️ Загрузка артефакта
        uses: actions/upload-artifact@v4
        with:
          name: Dictator-macOS
          path: dist/Dictator.app.zip

  # ── 4. Релиз ───────────────────────────────────────────────
  release:
    name: 📦 Публикация релиза
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: ⬇️ Скачивание артефакта
        uses: actions/download-artifact@v4
        with:
          name: Dictator-macOS

      - name: 📦 Создание GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Dictator.app.zip
          generate_release_notes: true