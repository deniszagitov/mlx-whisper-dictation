name: Build macOS App

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-macos-app.yml
      - README.md
      - requirements.txt
      - setup.py
      - whisper-dictation.py

jobs:
  build-app:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependency
        run: brew install portaudio

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install py2app==0.28.10 modulegraph
          python -m pip install -r requirements.txt

      - name: Build app bundle
        run: python setup.py py2app

      - name: Archive app bundle
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/MLX Whisper Dictation.app" \
            "dist/MLX-Whisper-Dictation.app.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MLX-Whisper-Dictation-macOS
          path: dist/MLX-Whisper-Dictation.app.zip