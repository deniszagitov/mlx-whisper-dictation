name: 🚀 CI/CD Пайплайн

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
    paths:
      - .github/workflows/build-macos-app.yml
      - README.md
      - AGENTS.md
      - pyproject.toml
      - .python-version
      - scripts/selfcheck.py
      - setup.py
      - whisper-dictation.py
      - "tests/**"
  pull_request:
    paths:
      - .github/workflows/build-macos-app.yml
      - README.md
      - AGENTS.md
      - pyproject.toml
      - .python-version
      - scripts/selfcheck.py
      - setup.py
      - whisper-dictation.py
      - "tests/**"

# Отменяем предыдущие запуски для того же PR/ветки
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  APP_NAME: "Dictator.app"
  ARTIFACT_BASENAME: "Dictator-macos-apple-silicon"

jobs:
  # ── 1. Линтер ──────────────────────────────────────────────
  lint:
    name: 🔍 Проверка кода
    runs-on: macos-14

    steps:
      - name: 📥 Получение кода
        uses: actions/checkout@v4

      - name: 🐍 Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Установка uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: 🔊 Установка portaudio
        run: brew install portaudio

      - name: 🔗 Синхронизация зависимостей
        run: uv sync --dev --frozen

      - name: 🔍 Запуск Ruff
        run: uv run ruff check .

  # ── 2. Тесты ───────────────────────────────────────────────
  test:
    name: 🧪 Тесты
    runs-on: macos-14

    steps:
      - name: 📥 Получение кода
        uses: actions/checkout@v4

      - name: 🐍 Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Установка uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: 🔊 Установка portaudio
        run: brew install portaudio

      - name: 🔗 Синхронизация зависимостей
        run: uv sync --dev --frozen

      - name: 🧪 Запуск pytest
        run: uv run python -m pytest tests/ -x -q

  # ── 3. Сборка ──────────────────────────────────────────────
  build:
    name: 🏗️ Сборка приложения
    runs-on: macos-14
    needs: [lint, test]
    outputs:
      release_asset_name: ${{ steps.bundle_meta.outputs.release_asset_name }}

    steps:
      - name: 📥 Получение кода
        uses: actions/checkout@v4

      - name: 🐍 Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Установка uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: 🔊 Установка portaudio
        run: brew install portaudio

      - name: 🔗 Синхронизация зависимостей
        run: uv sync --dev --frozen

      - name: 🏷️ Подготовка имени артефакта
        id: bundle_meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            suffix="${GITHUB_REF_NAME}"
          else
            suffix="${GITHUB_SHA::7}"
          fi

          release_asset_name="${ARTIFACT_BASENAME}-${suffix}.zip"

          echo "release_asset_name=${release_asset_name}" >> "$GITHUB_OUTPUT"
          echo "RELEASE_ASSET_NAME=${release_asset_name}" >> "$GITHUB_ENV"

      - name: 🏗️ Сборка app bundle
        run: uv run python setup.py py2app

      - name: 🗜️ Архивирование app bundle
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/${APP_NAME}" \
            "dist/${RELEASE_ASSET_NAME}"

      - name: ⬆️ Загрузка артефакта
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_BASENAME }}
          path: dist/${{ steps.bundle_meta.outputs.release_asset_name }}
          if-no-files-found: error

  # ── 4. Релиз ───────────────────────────────────────────────
  release:
    name: 📦 Публикация релиза
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: ⬇️ Скачивание артефакта
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_BASENAME }}
          path: release-assets

      - name: 📦 Создание GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/${{ needs.build.outputs.release_asset_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true