site_name: Dictator
site_description: Автогенерируемая документация menubar-приложения офлайн-диктовки для macOS
site_url: https://zagitov.github.io/mlx-whisper-dictation/
repo_url: https://github.com/zagitov/mlx-whisper-dictation
repo_name: zagitov/mlx-whisper-dictation

theme:
  name: material
  language: ru
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.follow

nav:
  - Обзор: index.md
  - API:
      - Runtime: api/runtime.md
      - Сборка: api/setup.md
  - Архитектура: architecture.md

plugins:
  - search

hooks:
  - scripts/generate_docs.py

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid.js