site_name: Dictator
site_description: Автогенерируемая документация menubar-приложения офлайн-диктовки для macOS
site_url: https://deniszagitov.github.io/mlx-whisper-dictation/
repo_url: https://github.com/deniszagitov/mlx-whisper-dictation
repo_name: deniszagitov/mlx-whisper-dictation

theme:
  name: material
  language: ru
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.follow

nav:
  - Обзор: index.md
  - Архитектура: architecture.md
  - API:
      - Runtime overview: api/runtime.md
      - CLI и запуск: api/entrypoint.md
      - Runtime-модули:
          - Domain и настройки: api/modules/config.md
          - Аудио и микрофон: api/modules/audio.md
          - Диагностика: api/modules/diagnostics.md
          - Глобальные хоткеи: api/modules/hotkeys.md
          - Разрешения macOS: api/modules/permissions.md
          - Распознавание и вставка: api/modules/transcriber.md
          - LLM-обработка: api/modules/llm.md
          - Menu bar UI: api/modules/ui.md
      - Сборка: api/setup.md

plugins:
  - search

hooks:
  - scripts/generate_docs.py

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid.js
